<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>รายชื่อนักศึกษา</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100%; min-height: 100vh;
      background-image: url('https://media.tenor.com/cRTQk6N_FxMAAAAe/swag-cat-swagbilli-cutecat-cats-cat-swag-ok-yooo-yo.png');
      background-size: cover; background-position: center; background-attachment: fixed;
      display: flex; justify-content: center; align-items: center; font-family: 'Arial', sans-serif; padding: 20px;
    }
    .container { background-color: rgba(190,226,237,0.95); padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 8px 16px rgba(0,0,0,0.3); max-width: 900px; width: 100%; }
    h1 { color: #111; font-weight: bold; font-size: 28px; margin-bottom: 12px; }
    .controls { display:flex; gap:10px; justify-content:center; margin-bottom:10px; }
    input[type='text']{ padding:10px; font-size:16px; width:300px; border-radius:6px; border:1px solid #ccc; }
    button { padding:10px 16px; font-size:16px; border-radius:6px; border:none; cursor:pointer; }
    button.add { background:#4caf50; color:white; }
    button.update { background:#2196f3; color:white; }
    button.cancel { background:#9e9e9e; color:white; }
    .info-table { width:100%; margin: 12px auto; background-color: rgba(255,255,255,0.9); border-collapse: collapse; border-radius:8px; overflow:hidden; }
    .info-table th, .info-table td { padding:10px 12px; text-align:left; color:#111; border-bottom:1px solid rgba(0,0,0,0.06); }
    .info-table th { background: rgba(255,107,157,0.9); color:white; }
    .actions button { margin-right:6px; }
    .msg { margin-top:8px; color:#333; min-height:20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎵 รายชื่อนักศึกษา 🎮</h1>

    <div class="controls">
      <input id="studentName" type="text" placeholder="ชื่อ-นามสกุล" />
      <button id="addBtn" class="add">เพิ่มรายชื่อ</button>
      <button id="updateBtn" class="update" style="display:none">บันทึกการแก้ไข</button>
      <button id="cancelBtn" class="cancel" style="display:none">ยกเลิก</button>
    </div>
    <div class="msg" id="msg"></div>

    <table class="info-table">
      <thead>
        <tr>
          <th>รหัสนักศึกษา</th>
          <th>ชื่อ-นามสกุล</th>
          <th>การกระทำ</th>
        </tr>
      </thead>
      <tbody id="studentsBody">
      </tbody>
    </table>
  </div>

  <script>
    let editingId = null;

    async function loadStudents(){
      const res = await fetch('/api/students');
      const data = await res.json();
      const tbody = document.getElementById('studentsBody');
      tbody.innerHTML = '';
      (data.rows || []).forEach(row => {
        const tr = document.createElement('tr');
        tr.innerHTML = `\n          <td>${row.student_id || 'N/A'}</td>\n          <td>${escapeHtml(row.student_name) || 'N/A'}</td>\n          <td class="actions">\n            <button data-id="${row.student_id}" data-name="${escapeAttr(row.student_name)}" onclick="onEdit(this)">แก้ไข</button>\n            <button data-id="${row.student_id}" onclick="onDelete(this)">ลบ</button>\n          </td>\n        `;
        tbody.appendChild(tr);
      });
    }

    function escapeHtml(str){
      if (!str) return '';
      return str.replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#39;");
    }
    function escapeAttr(str){ return (str||'').replaceAll('"','&quot;'); }

    document.getElementById('addBtn').addEventListener('click', async () => {
      const nameEl = document.getElementById('studentName');
      const name = nameEl.value.trim();
      const msg = document.getElementById('msg');
      if (!name) { msg.textContent = 'กรุณากรอกชื่อก่อน'; return; }
      try {
        const res = await fetch('/api/students', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ student_name: name }) });
        const data = await res.json();
        if (res.ok) {
          msg.textContent = 'เพิ่มสำเร็จ';
          nameEl.value = '';
          loadStudents();
        } else {
          msg.textContent = data.error || 'ไม่สามารถเพิ่มได้';
        }
      } catch (err) {
        msg.textContent = err.message;
      }
    });

    function onEdit(btn){
      const id = btn.getAttribute('data-id');
      const name = btn.getAttribute('data-name');
      editingId = id;
      document.getElementById('studentName').value = name;
      document.getElementById('addBtn').style.display = 'none';
      document.getElementById('updateBtn').style.display = 'inline-block';
      document.getElementById('cancelBtn').style.display = 'inline-block';
      document.getElementById('msg').textContent = '';
    }

    document.getElementById('cancelBtn').addEventListener('click', () => {
      resetForm();
    });

    document.getElementById('updateBtn').addEventListener('click', async () => {
      const nameEl = document.getElementById('studentName');
      const name = nameEl.value.trim();
      const msg = document.getElementById('msg');
      if (!editingId) { msg.textContent = 'ไม่มีรายการให้แก้ไข'; return; }
      if (!name) { msg.textContent = 'กรุณากรอกชื่อก่อน'; return; }
      try {
        const res = await fetch('/api/students/' + editingId, { method: 'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ student_name: name }) });
        const data = await res.json();
        if (res.ok) {
          msg.textContent = 'แก้ไขสำเร็จ';
          resetForm();
          loadStudents();
        } else {
          msg.textContent = data.error || 'ไม่สามารถแก้ไขได้';
        }
      } catch (err) {
        msg.textContent = err.message;
      }
    });

    async function onDelete(btn){
      if (!confirm('ต้องการลบรายการนี้หรือไม่?')) return;
      const id = btn.getAttribute('data-id');
      const msg = document.getElementById('msg');
      try {
        const res = await fetch('/api/students/' + id, { method: 'DELETE' });
        const data = await res.json();
        if (res.ok) {
          msg.textContent = 'ลบสำเร็จ';
          loadStudents();
        } else {
          msg.textContent = data.error || 'ไม่สามารถลบได้';
        }
      } catch (err) {
        msg.textContent = err.message;
      }
    }

    function resetForm(){
      editingId = null;
      document.getElementById('studentName').value = '';
      document.getElementById('addBtn').style.display = 'inline-block';
      document.getElementById('updateBtn').style.display = 'none';
      document.getElementById('cancelBtn').style.display = 'none';
      document.getElementById('msg').textContent = '';
    }

    // โหลดรายการตอนเริ่ม
    loadStudents();
  </script>
</body>
</html>
